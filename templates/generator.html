<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliothèque — Carousel Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #06080d;
  --surface:  #0a0e16;
  --surface2: #0f1520;
  --card:     #121826;
  --card2:    #171f2e;
  --border:   rgba(255,255,255,.06);
  --border2:  rgba(255,255,255,.11);
  --border3:  rgba(255,255,255,.18);
  --text:     #e4e8f2;
  --muted:    #4a5268;
  --muted2:   #7b87a0;
  --accent:   #6c5ce7;
  --accent-hi:#8b7cf8;
  --accent2:  #00cba9;
  --accent3:  #f06292;
  --danger:   #f87171;
  --success:  #34d399;
  --warn:     #fbbf24;
  --radius:   12px;
  --radius-sm:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.025;pointer-events:none;z-index:0;
}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:600px;height:600px;top:-200px;left:-150px;background:rgba(108,92,231,.08)}
.orb-2{width:500px;height:500px;bottom:-150px;right:-100px;background:rgba(0,203,169,.06)}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(6,8,13,.85);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
  padding:0 32px;height:60px;
}
.topbar-logo{
  display:flex;align-items:center;gap:10px;text-decoration:none;
  font-family:'Syne',sans-serif;font-weight:800;font-size:15px;
  color:var(--text);letter-spacing:-.02em;
}
.topbar-logo img{width:32px;height:32px;border-radius:8px;object-fit:cover}
.topbar-sep{width:1px;height:20px;background:var(--border2)}
.topbar-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:15px;
  color:var(--muted2);
}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn-back{
  display:flex;align-items:center;gap:6px;padding:7px 14px;
  background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--muted2);font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;text-decoration:none;letter-spacing:.02em;
}
.btn-back:hover{background:var(--card);border-color:var(--accent);color:var(--accent)}
.btn-new{
  display:flex;align-items:center;gap:6px;padding:7px 16px;
  background:var(--accent);border:none;border-radius:var(--radius-sm);
  color:#fff;font-size:12px;font-weight:700;cursor:pointer;
  transition:all .15s;text-decoration:none;letter-spacing:.02em;
}
.btn-new:hover{background:var(--accent-hi);transform:translateY(-1px)}

/* ── Stats bar ── */
.stats-bar{
  position:relative;z-index:1;
  display:flex;align-items:stretch;gap:0;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.stat-item{
  flex:1;padding:20px 28px;
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px;
}
.stat-item:last-child{border-right:none}
.stat-val{
  font-family:'Syne',sans-serif;font-size:26px;font-weight:800;
  letter-spacing:-.03em;line-height:1;
}
.stat-val.accent1{color:var(--accent-hi)}
.stat-val.accent2{color:var(--accent2)}
.stat-val.accent3{color:var(--accent3)}
.stat-val.warn{color:var(--warn)}
.stat-label{font-size:11px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* ── Controls bar ── */
.controls{
  position:relative;z-index:1;
  display:flex;align-items:center;gap:12px;
  padding:16px 32px;border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.search-wrap{
  position:relative;flex:1;min-width:200px;max-width:380px;
}
.search-wrap svg{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;
}
.search-input{
  width:100%;padding:9px 12px 9px 36px;
  background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color .15s;
}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
/* ── Controls rows ── */
.controls{flex-direction:column;align-items:stretch;gap:0;padding:0}
.controls-row{
  display:flex;align-items:center;gap:10px;
  padding:12px 32px;flex-wrap:wrap;
}
.controls-row+.controls-row{border-top:1px solid var(--border)}
.controls-meta{
  display:flex;align-items:center;gap:10px;
  padding:8px 32px;border-top:1px solid var(--border);
  background:rgba(255,255,255,.015);
  flex-wrap:wrap;
}
.result-count{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.active-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{
  display:flex;align-items:center;gap:4px;
  padding:3px 8px 3px 10px;background:rgba(108,92,231,.12);
  border:1px solid rgba(108,92,231,.25);border-radius:100px;
  font-size:11px;font-weight:600;color:var(--accent-hi);white-space:nowrap;
}
.chip-date{background:rgba(0,203,169,.1);border-color:rgba(0,203,169,.25);color:var(--accent2)}
.chip-remove{
  width:14px;height:14px;display:flex;align-items:center;justify-content:center;
  background:none;border:none;color:inherit;cursor:pointer;opacity:.7;
  border-radius:50%;transition:opacity .1s;padding:0;font-size:12px;line-height:1;
}
.chip-remove:hover{opacity:1}
.btn-clear-all{
  font-size:11px;color:var(--muted);cursor:pointer;background:none;border:none;
  text-decoration:underline;padding:0;transition:color .12s;
}
.btn-clear-all:hover{color:var(--text)}

/* ── Format filters ── */
.filter-group{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.filter-btn{
  padding:6px 12px;background:var(--card);border:1px solid var(--border2);
  border-radius:var(--radius-sm);color:var(--muted2);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;
}
.filter-btn:hover{border-color:var(--border3);color:var(--text)}
.filter-btn.active{background:rgba(108,92,231,.15);border-color:var(--accent);color:var(--accent-hi)}
.filter-btn[data-filter="trash"].active{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.4);color:var(--danger)}
.filter-btn[data-filter="trash"]:hover{border-color:rgba(248,113,113,.3);color:var(--danger)}

/* ── Date filters ── */
.date-sep{width:1px;height:18px;background:var(--border2);flex-shrink:0}
.date-group{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.date-pill{
  padding:5px 11px;background:var(--card);border:1px solid var(--border2);
  border-radius:100px;color:var(--muted2);font-size:11px;font-weight:700;
  cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.02em;
}
.date-pill:hover{border-color:rgba(0,203,169,.4);color:var(--accent2)}
.date-pill.active{
  background:rgba(0,203,169,.1);border-color:rgba(0,203,169,.5);
  color:var(--accent2);
}
.date-range-wrap{
  display:none;align-items:center;gap:6px;
  padding:5px 10px;background:var(--card);border:1px solid var(--border2);
  border-radius:var(--radius-sm);
}
.date-range-wrap.open{display:flex}
.date-range-wrap input[type="date"]{
  background:transparent;border:none;color:var(--text);
  font-size:11px;font-family:'DM Mono',monospace;
  outline:none;cursor:pointer;width:120px;
  color-scheme:dark;
}
.date-range-sep{font-size:11px;color:var(--muted)}
.btn-range-apply{
  padding:4px 10px;background:var(--accent2);border:none;border-radius:6px;
  color:#06080d;font-size:11px;font-weight:700;cursor:pointer;transition:opacity .12s;
}
.btn-range-apply:hover{opacity:.85}
.trash-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;padding:0 4px;
  background:var(--danger);border-radius:100px;
  font-size:9px;font-weight:800;color:#fff;margin-left:4px;
  line-height:1;
}

/* ── Soft-deleted card ── */
.carousel-card.soft-deleted{
  opacity:.45;filter:grayscale(.6);
  border-color:rgba(248,113,113,.15);
  transform:none !important;box-shadow:none !important;
}
.carousel-card.soft-deleted .card-thumb-overlay{display:none !important}
.soft-delete-banner{
  position:absolute;top:0;left:0;right:0;
  padding:6px 10px;
  background:rgba(248,113,113,.18);backdrop-filter:blur(4px);
  font-size:10px;font-weight:700;color:var(--danger);
  letter-spacing:.06em;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
  border-bottom:1px solid rgba(248,113,113,.2);
}
.btn-card.restore{border-color:rgba(52,211,153,.25);color:var(--success)}
.btn-card.restore:hover{background:rgba(52,211,153,.08);border-color:var(--success)}

/* ── Undo toast ── */
.toast.undo{border-color:rgba(251,191,36,.35);color:var(--warn);padding-right:8px}
.btn-undo{
  margin-left:8px;padding:4px 10px;
  background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);
  border-radius:6px;color:var(--warn);font-size:12px;font-weight:700;
  cursor:pointer;transition:all .12s;white-space:nowrap;flex-shrink:0;
}
.btn-undo:hover{background:rgba(251,191,36,.25)}
.undo-bar{
  height:3px;background:var(--warn);border-radius:0 0 3px 3px;
  position:absolute;bottom:0;left:0;
  animation:undoBar linear both;
  transform-origin:left;
}
@keyframes undoBar{from{transform:scaleX(1)}to{transform:scaleX(0)}}
.sort-select{
  padding:6px 12px;background:var(--card);border:1px solid var(--border2);
  border-radius:var(--radius-sm);color:var(--muted2);font-size:12px;
  font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;margin-left:auto;
}
.sort-select:focus{border-color:var(--accent)}

/* ── Group headers in grid ── */
.group-header{
  grid-column:1/-1;
  display:flex;align-items:center;gap:12px;
  padding:4px 0 2px;
  margin-top:8px;
}
.group-header:first-child{margin-top:0}
.group-label{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:800;
  color:var(--muted2);letter-spacing:.08em;text-transform:uppercase;
  white-space:nowrap;
}
.group-line{flex:1;height:1px;background:var(--border)}
.group-count{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  white-space:nowrap;
}
.controls-right{margin-left:auto;display:flex;gap:6px}
.view-btn{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:var(--card);border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--muted);cursor:pointer;transition:all .15s;
}
.view-btn:hover,.view-btn.active{border-color:var(--accent);color:var(--accent)}

/* ── Grid ── */
.library-wrap{
  position:relative;z-index:1;
  padding:28px 32px;
  min-height:400px;
}
.library-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
}
.library-grid.list-view{
  grid-template-columns:1fr;gap:10px;
}

/* ── Card ── */
.carousel-card{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);
  overflow:hidden;display:flex;flex-direction:column;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  cursor:pointer;
  animation:cardIn .3s ease both;
}
.carousel-card:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(0,0,0,.35);
  border-color:var(--border3);
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.card-thumb{
  width:100%;aspect-ratio:1;background:var(--surface2);
  position:relative;overflow:hidden;flex-shrink:0;
}
.card-thumb img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .3s;display:block;
}
.carousel-card:hover .card-thumb img{transform:scale(1.04)}
.card-thumb-placeholder{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  color:var(--muted);
}
.card-thumb-placeholder svg{opacity:.35}
.card-thumb-placeholder span{font-size:11px;letter-spacing:.05em;text-transform:uppercase}
.card-thumb-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(6,8,13,.7) 0%,transparent 50%);
  opacity:0;transition:opacity .2s;
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:12px;
}
.carousel-card:hover .card-thumb-overlay{opacity:1}
.btn-preview-quick{
  display:flex;align-items:center;gap:6px;
  padding:7px 16px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.2);border-radius:100px;
  color:#fff;font-size:12px;font-weight:600;cursor:pointer;
  transition:background .15s;
}
.btn-preview-quick:hover{background:rgba(255,255,255,.2)}
.slide-count-badge{
  position:absolute;top:10px;right:10px;
  padding:3px 8px;background:rgba(6,8,13,.75);backdrop-filter:blur(6px);
  border-radius:100px;font-size:10px;font-weight:700;
  color:var(--muted2);letter-spacing:.04em;
}

.card-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:10px;flex:1}
.card-name-row{display:flex;align-items:center;gap:8px}
.card-name{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
  letter-spacing:-.01em;cursor:text;
}
.card-name-input{
  flex:1;background:var(--surface2);border:1px solid var(--accent);
  border-radius:6px;padding:4px 8px;color:var(--text);
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  outline:none;display:none;
}
.btn-rename-icon{
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;color:var(--muted);cursor:pointer;
  border-radius:4px;transition:all .15s;flex-shrink:0;opacity:0;
}
.carousel-card:hover .btn-rename-icon{opacity:1}
.btn-rename-icon:hover{background:var(--card2);color:var(--accent)}

.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta-badge{
  padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;
}
.badge-pdf{background:rgba(240,98,146,.12);color:#f06292;border:1px solid rgba(240,98,146,.2)}
.badge-png{background:rgba(0,203,169,.1);color:var(--accent2);border:1px solid rgba(0,203,169,.2)}
.badge-slides{background:rgba(108,92,231,.12);color:var(--accent-hi);border:1px solid rgba(108,92,231,.2)}
.card-date{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}
.card-size{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}

.card-actions{display:flex;gap:6px;padding-top:4px}
.btn-card{
  flex:1;padding:7px 6px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--radius-sm);color:var(--muted2);font-size:11px;font-weight:600;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;
  justify-content:center;gap:5px;white-space:nowrap;
}
.btn-card:hover{background:var(--card2);border-color:var(--border3);color:var(--text)}
.btn-card.primary{border-color:rgba(108,92,231,.3);color:var(--accent-hi)}
.btn-card.primary:hover{background:rgba(108,92,231,.12);border-color:var(--accent)}
.btn-card.danger{border-color:rgba(248,113,113,.2);color:var(--danger)}
.btn-card.danger:hover{background:rgba(248,113,113,.08)}

/* List view card */
.list-view .carousel-card{
  flex-direction:row;align-items:stretch;border-radius:var(--radius-sm);
  min-height:72px;
}
.list-view .card-thumb{
  width:72px;min-width:72px;height:72px;aspect-ratio:unset;
  flex-shrink:0;border-radius:var(--radius-sm) 0 0 var(--radius-sm);
  overflow:hidden;
}
.list-view .card-thumb img{border-radius:0;height:100%;object-fit:cover}
.list-view .card-thumb-overlay{display:none}
.list-view .card-body{
  flex-direction:row;align-items:center;
  padding:10px 14px;gap:14px;flex:1;min-width:0;
}
.list-view .card-name-row{flex:1;min-width:0}
.list-view .card-name{font-size:13px}
.list-view .card-meta{flex-wrap:nowrap;align-items:center}
.list-view .card-date{margin-left:0}
.list-view .card-actions{padding-top:0;gap:6px;flex-shrink:0;min-width:0}
.list-view .card-size{display:none}
.list-view .btn-card{white-space:nowrap}

/* ── Empty state ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 32px;gap:16px;text-align:center;
}
.empty-icon{font-size:48px;opacity:.3}
.empty-state h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--muted2)}
.empty-state p{font-size:13px;color:var(--muted);max-width:320px}

/* ── Lightbox ── */
.lightbox{
  position:fixed;inset:0;z-index:500;
  background:rgba(2,4,8,.94);backdrop-filter:blur(20px);
  display:none;flex-direction:column;align-items:center;justify-content:center;
}
.lightbox.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lightbox-topbar{
  position:absolute;top:0;left:0;right:0;height:60px;
  display:flex;align-items:center;padding:0 24px;gap:16px;
  background:rgba(6,8,13,.6);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
}
.lightbox-title{
  font-family:'Syne',sans-serif;font-weight:700;font-size:14px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;
}
.lightbox-counter{
  font-family:'DM Mono',monospace;font-size:13px;color:var(--muted2);
  white-space:nowrap;
}
.btn-lightbox-close{
  width:36px;height:36px;background:var(--card2);border:1px solid var(--border2);
  border-radius:var(--radius-sm);color:var(--muted2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-size:18px;
}
.btn-lightbox-close:hover{border-color:var(--danger);color:var(--danger)}
.lightbox-stage{
  display:flex;align-items:center;gap:20px;padding:80px 24px 24px;
  width:100%;max-width:900px;flex:1;
}
.btn-nav{
  width:44px;height:44px;flex-shrink:0;
  background:var(--card2);border:1px solid var(--border2);
  border-radius:50%;color:var(--muted2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.btn-nav:hover:not(:disabled){background:var(--surface2);border-color:var(--border3);color:var(--text)}
.btn-nav:disabled{opacity:.25;cursor:not-allowed}
.lightbox-img-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  max-height:calc(100vh - 160px);
}
.lightbox-img{
  max-width:100%;max-height:100%;
  border-radius:var(--radius);
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  object-fit:contain;
}
.lightbox-pdf-msg{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  color:var(--muted2);text-align:center;
}
.lightbox-pdf-msg svg{opacity:.4}

/* PDF inline viewer — normal mode */
.lightbox-pdf-viewer{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:stretch;
}
.lightbox-pdf-iframe{
  flex:1;border:none;background:#fff;
  min-height:400px;display:block;
}
.btn-lb-action.pdf-dl{
  border-color:rgba(240,98,146,.3);color:#f06292;
}
.btn-lb-action.pdf-dl:hover{
  background:rgba(240,98,146,.08);border-color:#f06292;
}

/* ── PDF full-screen mode ── */
.lightbox.pdf-mode{
  flex-direction:column;
}
/* Stage becomes a plain flex container, full remaining height */
.lightbox.pdf-mode .lightbox-stage{
  padding:0;gap:0;max-width:100%;
  width:100%;flex:1;align-items:stretch;
  overflow:hidden;
}
/* Hide prev/next nav buttons — not needed for PDF */
.lightbox.pdf-mode .btn-nav{display:none}
/* Footer dots: hide */
.lightbox.pdf-mode .lightbox-footer{display:none}
/* img-wrap fills full width and height */
.lightbox.pdf-mode .lightbox-img-wrap{
  flex:1;max-height:none;height:100%;width:100%;
  align-items:stretch;
  border-radius:0;
}
/* PDF viewer + iframe fill everything */
.lightbox.pdf-mode .lightbox-pdf-viewer{
  flex:1;height:100%;border-radius:0;box-shadow:none;
}
.lightbox.pdf-mode .lightbox-pdf-iframe{
  flex:1;height:100%;min-height:0;border-radius:0;
}
/* Actions bar: fixed strip at bottom of screen */
.lightbox.pdf-mode .lightbox-actions{
  position:fixed;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:10px 24px;
  background:rgba(6,8,13,.88);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);
  box-shadow:0 -4px 24px rgba(0,0,0,.4);
}
/* Keep iframe above the fixed actions bar */
.lightbox.pdf-mode .lightbox-stage{
  padding-bottom:52px; /* height of the actions strip */
}
.lightbox-footer{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:16px;flex-wrap:wrap;
}
.lb-dot{
  width:6px;height:6px;border-radius:50%;background:var(--muted);
  cursor:pointer;transition:all .15s;
}
.lb-dot.active{background:var(--accent-hi);width:18px;border-radius:3px}
.lightbox-actions{
  position:absolute;bottom:16px;right:24px;
  display:flex;gap:8px;
}
.btn-lb-action{
  display:flex;align-items:center;gap:6px;padding:8px 16px;
  background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--muted2);font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;text-decoration:none;
}
.btn-lb-action:hover{border-color:var(--accent);color:var(--accent)}
.btn-lb-action.danger:hover{border-color:var(--danger);color:var(--danger)}

/* ── Confirm modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(2,4,8,.8);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;animation:fadeIn .15s ease}
.modal-box{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);
  padding:28px;max-width:400px;width:90%;
  box-shadow:0 24px 60px rgba(0,0,0,.5);
}
.modal-box h3{
  font-family:'Syne',sans-serif;font-size:17px;font-weight:800;
  margin-bottom:10px;color:var(--danger);
}
.modal-box p{font-size:13px;color:var(--muted2);margin-bottom:20px;line-height:1.6}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-modal{
  padding:8px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;border:1px solid transparent;
}
.btn-modal.cancel{background:var(--surface2);border-color:var(--border2);color:var(--muted2)}
.btn-modal.cancel:hover{color:var(--text)}
.btn-modal.confirm{background:var(--danger);color:#fff}
.btn-modal.confirm:hover{opacity:.85}

/* ── Toast ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:700;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:10px 18px;background:var(--card2);border:1px solid var(--border2);
  border-radius:var(--radius-sm);font-size:13px;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.3);
  animation:toastIn .2s ease both;
  display:flex;align-items:center;gap:8px;
}
.toast.success{border-color:rgba(52,211,153,.3);color:var(--success)}
.toast.error{border-color:rgba(248,113,113,.3);color:var(--danger)}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ══════════════════════════════════════════
   RESPONSIVE — TABLET  (768 – 1023px)
══════════════════════════════════════════ */
@media(max-width:1023px){
  .topbar{padding:0 20px;gap:12px}

  /* Stats: 2 cols × 2 rows */
  .stats-bar{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
  .stat-item{min-width:0;flex:none;padding:18px 20px;border-right:none;border-bottom:1px solid var(--border)}
  .stat-item:nth-child(odd){border-right:1px solid var(--border)}
  .stat-item:nth-child(3),.stat-item:nth-child(4){border-bottom:none}

  .controls-row{padding:10px 20px}
  .controls-meta{padding:7px 20px}
  .search-wrap{max-width:340px;flex:1 1 160px}
  .library-wrap{padding:20px}

  /* Grid: 3 cols at 768-1023 */
  .library-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

  /* List view: slightly tighter */
  .list-view .card-thumb{width:64px;min-width:64px;height:64px}

  /* Lightbox */
  .lightbox-stage{padding:72px 16px 16px;gap:12px}
  .lightbox-actions{right:16px;bottom:12px;gap:6px}
  .btn-lb-action{padding:7px 12px;font-size:11px}
}

/* ══════════════════════════════════════════
   RESPONSIVE — MOBILE  (< 768px)
══════════════════════════════════════════ */
@media(max-width:767px){
  /* Topbar */
  .topbar{padding:0 14px;height:52px;gap:8px}
  .topbar-logo{font-size:13px;gap:7px}
  .topbar-logo img{width:26px;height:26px}
  .topbar-sep{display:none}
  .topbar-title{display:none}
  .topbar-right{gap:6px}
  .btn-back{padding:6px 10px;font-size:11px}
  .btn-new{padding:6px 10px;font-size:11px}
  .btn-new-label{display:none}

  /* Stats: 2×2 grid */
  .stats-bar{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
  .stat-item{min-width:0;flex:none;padding:14px 16px;border-right:none;border-bottom:1px solid var(--border)}
  .stat-item:nth-child(odd){border-right:1px solid var(--border)}
  .stat-item:nth-child(3),.stat-item:nth-child(4){border-bottom:none}
  .stat-val{font-size:22px}
  .stat-label{font-size:10px}

  /* Controls */
  .controls-row{padding:10px 14px;gap:8px}
  .controls-meta{padding:6px 14px}
  .filter-btn{padding:5px 9px;font-size:11px}
  .date-pill{padding:4px 9px;font-size:10px}
  .sort-select{font-size:11px;padding:5px 8px;width:100%}
  .date-range-wrap input[type="date"]{width:100px;font-size:10px}
  .date-sep{display:none}
  /* Row 2: wrap date pills to second line */
  .controls-row:nth-child(2){flex-wrap:wrap}
  .filter-group{flex:1}
  .date-group{flex:1 1 100%;order:3}

  /* Grid: 2 cols on mobile */
  .library-wrap{padding:12px 14px}
  .library-grid{grid-template-columns:repeat(2,1fr);gap:10px}

  /* Card grid view */
  .card-thumb{aspect-ratio:1}
  .card-body{padding:10px 12px 12px;gap:7px}
  .card-name{font-size:12px}
  .meta-badge{font-size:9px;padding:2px 6px}
  .card-date{font-size:10px}
  .card-size{font-size:10px}
  /* Actions: 2×2 grid on grid-view cards */
  .card-actions{gap:4px;display:grid;grid-template-columns:1fr 1fr}
  .btn-card{font-size:10px;padding:7px 4px;justify-content:center}

  /* List view on mobile: horizontal, tighter */
  .list-view .carousel-card{min-height:62px}
  .list-view .card-thumb{width:62px;min-width:62px;height:62px}
  .list-view .card-body{padding:8px 10px;gap:8px;flex-wrap:wrap}
  .list-view .card-name-row{flex:1 1 100%;min-width:0}
  .list-view .card-meta{flex:0;order:2}
  .list-view .card-actions{
    flex:1 1 auto;order:3;
    display:flex;grid-template-columns:unset;
    gap:4px;min-width:0;
  }
  .list-view .card-name{font-size:12px}
  .list-view .card-actions .btn-card{padding:5px 8px;font-size:10px;flex:1}

  /* Lightbox */
  .lightbox-topbar{padding:0 14px;height:52px}
  .lightbox-title{font-size:13px}
  .lightbox-counter{font-size:11px}
  .btn-lightbox-close{width:32px;height:32px;font-size:16px}
  .lightbox-stage{padding:60px 8px 8px;gap:8px}
  .btn-nav{width:36px;height:36px;flex-shrink:0}
  .lightbox-img{border-radius:8px}
  .lightbox-footer{padding:8px;gap:4px}
  .lb-dot{width:5px;height:5px}
  .lb-dot.active{width:14px}
  .lightbox-actions{
    position:fixed;right:0;left:0;bottom:0;padding:10px 14px;
    background:rgba(6,8,13,.85);backdrop-filter:blur(12px);
    border-top:1px solid var(--border);
    justify-content:center;gap:8px;
  }
  .lightbox-img-wrap{max-height:calc(100vh - 220px)}
  .lightbox-pdf-iframe{min-height:calc(100vh - 220px)}
  .btn-lb-action{flex:1;justify-content:center;padding:10px 10px;font-size:11px;max-width:180px}

  /* Modal */
  .modal-box{padding:20px;width:94%}
  .modal-box h3{font-size:15px}

  /* Toast: full width bottom */
  .toast-wrap{left:12px;right:12px;bottom:12px}
  .toast{font-size:12px;padding:10px 14px}
  .btn-undo{font-size:11px;padding:3px 8px}
}

/* ══════════════════════════════════════════
   RESPONSIVE — SMALL MOBILE  (< 480px)
══════════════════════════════════════════ */
@media(max-width:479px){
  .topbar{padding:0 12px}
  .btn-back-label{display:none}
  .btn-new{padding:6px 8px}

  /* Stats: tighter */
  .stat-val{font-size:20px}
  .stat-item{padding:12px 12px}

  /* Controls: compact */
  .controls-row{padding:8px 12px;gap:6px}
  .controls-meta{padding:5px 12px}
  .filter-btn{padding:4px 7px;font-size:10px}
  .date-pill{padding:3px 7px;font-size:10px}
  .sort-select{font-size:10px;padding:4px 7px}
  .date-group{gap:3px}
  .date-range-wrap{flex-wrap:wrap;gap:4px}
  .date-range-wrap input[type="date"]{width:90px;font-size:9px}

  /* Grid: 1 col on very small screens */
  .library-grid:not(.list-view){grid-template-columns:1fr;gap:10px}

  /* Grid-view card on 1-col: horizontal layout with square thumb */
  .library-grid:not(.list-view) .carousel-card{
    flex-direction:row;align-items:stretch;min-height:88px;
  }
  .library-grid:not(.list-view) .carousel-card .card-thumb{
    width:88px;min-width:88px;height:88px;aspect-ratio:unset;
    flex-shrink:0;border-radius:var(--radius-sm) 0 0 var(--radius-sm);
  }
  .library-grid:not(.list-view) .carousel-card .card-thumb .card-thumb-overlay{display:none}
  .library-grid:not(.list-view) .carousel-card .card-body{
    padding:10px 12px;gap:6px;justify-content:center;
  }
  .library-grid:not(.list-view) .carousel-card .slide-count-badge{display:none}
  .library-grid:not(.list-view) .carousel-card .card-size{display:none}
  /* Actions: row of equal buttons */
  .library-grid:not(.list-view) .carousel-card .card-actions{
    display:flex;grid-template-columns:unset;flex-wrap:nowrap;gap:4px;
  }
  .library-grid:not(.list-view) .carousel-card .btn-card{flex:1;font-size:10px;padding:6px 3px}

  /* List view stays horizontal */
  .list-view .carousel-card{min-height:58px}
  .list-view .card-thumb{width:58px;min-width:58px;height:58px}
  .list-view .card-body{padding:6px 8px;gap:5px}
  .list-view .card-name{font-size:11px}
  .list-view .card-actions .btn-card{padding:4px 5px;font-size:10px}

  /* Lightbox */
  .lightbox-img-wrap{padding:0;max-height:calc(100vh - 200px)}
  .lightbox-img{border-radius:4px}
  .btn-nav{width:32px;height:32px}
  .lb-dot{display:none}
  .lb-dot.active,.lb-dot:nth-child(-n+5){display:block}

  /* Toast */
  .toast-wrap{left:8px;right:8px;bottom:8px}
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- ── Topbar ── -->
<header class="topbar">
  <a class="topbar-logo" href="/">
    <img src="/static/logo/logo.png" alt="Logo" onerror="this.style.display='none'">
    CarouselGen
  </a>
  <div class="topbar-sep"></div>
  <span class="topbar-title">Bibliothèque</span>
  <div class="topbar-right">
    <a class="btn-back" href="/">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      <span class="btn-back-label">Éditeur</span>
    </a>
    <a class="btn-new" href="/">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span class="btn-new-label">Nouveau carousel</span>
    </a>
    <a class="btn-back" href="/logout"
       style="color:var(--danger);border-color:rgba(248,113,113,.25)"
       title="Se déconnecter">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </a>
  </div>
</header>

<!-- ── Stats ── -->
<section class="stats-bar" id="stats-bar">
  <div class="stat-item"><div class="stat-val accent1" id="stat-total">—</div><div class="stat-label">Carousels générés</div></div>
  <div class="stat-item"><div class="stat-val accent2" id="stat-slides">—</div><div class="stat-label">Slides au total</div></div>
  <div class="stat-item"><div class="stat-val accent3" id="stat-size">—</div><div class="stat-label">Espace utilisé</div></div>
  <div class="stat-item"><div class="stat-val warn"    id="stat-recent">—</div><div class="stat-label">Dernier ajout</div></div>
</section>

<!-- ── Controls ── -->
<div class="controls">

  <!-- Row 1 : Search + views + refresh -->
  <div class="controls-row">
    <div class="search-wrap" style="flex:1;max-width:420px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="search-input" type="text" placeholder="Rechercher par nom, date…">
    </div>
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
      <button class="view-btn active" id="view-grid" title="Vue grille" onclick="setView('grid')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="view-btn" id="view-list" title="Vue liste" onclick="setView('list')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="view-btn" title="Rafraîchir" onclick="loadLibrary()" style="margin-left:4px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
    </div>
  </div>

  <!-- Row 2 : Format + Date + Sort -->
  <div class="controls-row">
    <!-- Format -->
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">Tous</button>
      <button class="filter-btn" data-filter="png">PNG</button>
      <button class="filter-btn" data-filter="pdf">PDF</button>
      <button class="filter-btn" data-filter="trash" id="filter-trash-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Corbeille<span class="trash-badge" id="trash-badge" style="display:none">0</span>
      </button>
    </div>

    <div class="date-sep"></div>

    <!-- Date presets -->
    <div class="date-group" id="date-group">
      <button class="date-pill active" data-date="all">Toutes dates</button>
      <button class="date-pill" data-date="today">Aujourd'hui</button>
      <button class="date-pill" data-date="yesterday">Hier</button>
      <button class="date-pill" data-date="week">7 derniers jours</button>
      <button class="date-pill" data-date="month">Ce mois</button>
      <button class="date-pill" data-date="custom">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Période
      </button>
      <!-- Custom range -->
      <div class="date-range-wrap" id="date-range-wrap">
        <input type="date" id="date-from" title="Date de début">
        <span class="date-range-sep">→</span>
        <input type="date" id="date-to" title="Date de fin">
        <button class="btn-range-apply" onclick="applyDateRange()">OK</button>
      </div>
    </div>

    <!-- Sort -->
    <select class="sort-select" id="sort-select">
      <option value="date-desc">Plus récent</option>
      <option value="date-asc">Plus ancien</option>
      <option value="name-asc">Nom A→Z</option>
      <option value="slides-desc">Plus de slides</option>
      <option value="size-desc">Plus lourd</option>
    </select>
  </div>

  <!-- Meta row : result count + active chips -->
  <div class="controls-meta" id="controls-meta" style="display:none">
    <span class="result-count" id="result-count"></span>
    <div class="active-chips" id="active-chips"></div>
    <button class="btn-clear-all" id="btn-clear-all" onclick="clearAllFilters()" style="display:none">Tout effacer</button>
  </div>

</div>

<!-- ── Library Grid ── -->
<main class="library-wrap">
  <div class="library-grid" id="library-grid"></div>
</main>

<!-- ── Lightbox ── -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-topbar">
    <span class="lightbox-title" id="lb-title">—</span>
    <span class="lightbox-counter" id="lb-counter">— / —</span>
    <button class="btn-lightbox-close" onclick="closeLightbox()">✕</button>
  </div>
  <div class="lightbox-stage">
    <button class="btn-nav" id="btn-prev" onclick="lbNav(-1)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="lightbox-img-wrap" id="lb-img-wrap">
      <img class="lightbox-img" id="lb-img" src="" alt="">
    </div>
    <button class="btn-nav" id="btn-next" onclick="lbNav(1)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
  <div class="lightbox-footer" id="lb-dots"></div>
  <div class="lightbox-actions">
    <a class="btn-lb-action pdf-dl" id="lb-btn-pdf" href="#" target="_blank" style="display:none">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      Télécharger PDF
    </a>
    <a class="btn-lb-action" id="lb-btn-dl" href="#">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      ZIP
    </a>
    <button class="btn-lb-action danger" id="lb-btn-del" onclick="lbDeleteCurrent()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Supprimer
    </button>
  </div>
</div>

<!-- ── Confirm modal ── -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <h3>Supprimer ce carousel ?</h3>
    <p id="confirm-msg">Cette action est irréversible. Le dossier et tous ses fichiers seront supprimés.</p>
    <div class="modal-actions">
      <button class="btn-modal cancel" onclick="closeConfirm()">Annuler</button>
      <button class="btn-modal confirm" id="confirm-ok">Supprimer</button>
    </div>
  </div>
</div>

<!-- ── Toasts ── -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let allItems     = [];
let filtered     = [];
let activeFilter = 'all';
let activeDateFilter = 'all';
let dateRangeFrom = '';
let dateRangeTo   = '';
let activeSort   = 'date-desc';
let activeView   = 'grid';
let searchQuery  = '';

// Lightbox state
let lbJob      = null;
let lbSlides   = [];
let lbIndex    = 0;

// Confirm callback
let confirmCb  = null;

// ── Soft delete (localStorage) ──
const TRASH_KEY = 'carousel_trash_v1';

function loadTrash() {
  try { return new Set(JSON.parse(localStorage.getItem(TRASH_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveTrash(set) {
  localStorage.setItem(TRASH_KEY, JSON.stringify([...set]));
}
let trashSet = loadTrash();

function updateTrashBadge() {
  const badge = document.getElementById('trash-badge');
  const count = trashSet.size;
  badge.textContent = count;
  badge.style.display = count > 0 ? '' : 'none';
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  updateTrashBadge();
  loadLibrary();

  // Notification de connexion transmise par le paramètre URL
  const _p = new URLSearchParams(location.search);
  if (_p.get('toast') === 'connected') {
    setTimeout(() => toast('Connexion réussie — bienvenue !', 'success'), 400);
    history.replaceState({}, '', location.pathname);
  }

  // Search — also matches YYYY-MM-DD patterns
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase().trim();
    applyFilters();
  });

  document.getElementById('sort-select').addEventListener('change', e => {
    activeSort = e.target.value;
    applyFilters();
  });

  // Format filters
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      applyFilters();
    });
  });

  // Date pills
  document.querySelectorAll('[data-date]').forEach(pill => {
    pill.addEventListener('click', () => {
      const val = pill.dataset.date;
      if (val === 'custom') {
        document.getElementById('date-range-wrap').classList.toggle('open');
        pill.classList.toggle('active');
        if (!pill.classList.contains('active')) {
          activeDateFilter = 'all';
          document.querySelector('[data-date="all"]').classList.add('active');
          applyFilters();
        }
        return;
      }
      document.querySelectorAll('[data-date]').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      document.getElementById('date-range-wrap').classList.remove('open');
      activeDateFilter = val;
      dateRangeFrom = ''; dateRangeTo = '';
      applyFilters();
    });
  });

  // Keyboard nav
  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
    if (e.key === 'Escape')     closeLightbox();
  });
});

// ═══════════════════════════════════════════
//  LOAD LIBRARY
// ═══════════════════════════════════════════
async function loadLibrary() {
  try {
    const res  = await fetch('/api/library');
    const data = await res.json();
    allItems   = data.items || [];
    updateStats(data);
    applyFilters();
  } catch(e) {
    showGrid([]);
    toast('Erreur de chargement de la bibliothèque', 'error');
  }
}

function updateStats(data) {
  const active = (data.items || []).filter(i => !trashSet.has(i.job_id));
  document.getElementById('stat-total').textContent  = active.length;
  document.getElementById('stat-slides').textContent = active.reduce((s, i) => s + i.slide_count, 0);
  document.getElementById('stat-size').textContent   = formatSize(active.reduce((s, i) => s + i.size_bytes, 0));
  const recent = active[0];
  document.getElementById('stat-recent').textContent = recent ? formatDateShort(recent.created_at) : '—';
  updateTrashBadge();
}

// ═══════════════════════════════════════════
//  DATE UTILITIES
// ═══════════════════════════════════════════
function getDateBucket(isoStr) {
  const now  = new Date();
  const d    = new Date(isoStr);
  const todayStart     = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterdayStart = new Date(todayStart - 86400000);
  const weekStart      = new Date(todayStart - 6 * 86400000);
  const monthStart     = new Date(now.getFullYear(), now.getMonth(), 1);
  if (d >= todayStart)     return 'today';
  if (d >= yesterdayStart) return 'yesterday';
  if (d >= weekStart)      return 'week';
  if (d >= monthStart)     return 'month';
  return 'older';
}

const BUCKET_LABELS = {
  today:     "Aujourd'hui",
  yesterday: 'Hier',
  week:      'Cette semaine',
  month:     'Ce mois-ci',
  older:     'Plus ancien',
};
const BUCKET_ORDER = ['today','yesterday','week','month','older'];

function matchDateFilter(item) {
  if (activeDateFilter === 'all') return true;
  if (activeDateFilter === 'custom') {
    const d = new Date(item.created_at);
    if (dateRangeFrom) { const s = new Date(dateRangeFrom); if (d < s) return false; }
    if (dateRangeTo)   { const e = new Date(dateRangeTo + 'T23:59:59'); if (d > e) return false; }
    return true;
  }
  const bucket = getDateBucket(item.created_at);
  if (activeDateFilter === 'today')     return bucket === 'today';
  if (activeDateFilter === 'yesterday') return bucket === 'yesterday';
  if (activeDateFilter === 'week')      return ['today','yesterday','week'].includes(bucket);
  if (activeDateFilter === 'month')     return bucket !== 'older';
  return true;
}

function applyDateRange() {
  dateRangeFrom = document.getElementById('date-from').value;
  dateRangeTo   = document.getElementById('date-to').value;
  activeDateFilter = 'custom';
  applyFilters();
}

function clearAllFilters() {
  searchQuery = ''; activeFilter = 'all'; activeDateFilter = 'all';
  dateRangeFrom = ''; dateRangeTo = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter==='all'));
  document.querySelectorAll('[data-date]').forEach(p => p.classList.toggle('active', p.dataset.date==='all'));
  document.getElementById('date-range-wrap').classList.remove('open');
  applyFilters();
}

// ═══════════════════════════════════════════
//  FILTER + SORT
// ═══════════════════════════════════════════
function applyFilters() {
  const isTrash = activeFilter === 'trash';

  // Smart search: match name OR date string
  function matchSearch(item) {
    if (!searchQuery) return true;
    const q = searchQuery;
    if (item.display_name.toLowerCase().includes(q)) return true;
    if (item.created_at.includes(q)) return true;
    // Match formatted dates: "13 avr", "2026", etc.
    if (formatDate(item.created_at).toLowerCase().includes(q)) return true;
    if (formatTime(item.created_at).includes(q)) return true;
    return false;
  }

  filtered = allItems.filter(item => {
    const inTrash = trashSet.has(item.job_id);
    if (isTrash) return inTrash && matchSearch(item);
    if (inTrash) return false;

    const matchFormat =
      activeFilter === 'all' ? true :
      activeFilter === 'pdf' ? item.has_pdf :
      activeFilter === 'png' ? item.has_png : true;

    return matchSearch(item) && matchFormat && matchDateFilter(item);
  });

  filtered.sort((a, b) => {
    switch(activeSort) {
      case 'date-asc':    return a.created_at.localeCompare(b.created_at);
      case 'name-asc':    return a.display_name.localeCompare(b.display_name);
      case 'slides-desc': return b.slide_count - a.slide_count;
      case 'size-desc':   return b.size_bytes - a.size_bytes;
      default:            return b.created_at.localeCompare(a.created_at);
    }
  });

  updateControlsMeta();
  showGrid(filtered);
}

function updateControlsMeta() {
  const meta   = document.getElementById('controls-meta');
  const count  = document.getElementById('result-count');
  const chips  = document.getElementById('active-chips');
  const clearBtn = document.getElementById('btn-clear-all');

  const hasFilters = activeFilter !== 'all' || activeDateFilter !== 'all' || searchQuery;
  count.textContent = `${filtered.length} carousel${filtered.length !== 1 ? 's' : ''}`;
  meta.style.display = '';

  // Build chips
  const chipsHTML = [];
  if (activeFilter !== 'all' && activeFilter !== 'trash') {
    chipsHTML.push(`<span class="chip">${activeFilter.toUpperCase()}
      <button class="chip-remove" onclick="setFormatFilter('all')">✕</button></span>`);
  }
  if (activeDateFilter !== 'all') {
    const label = activeDateFilter === 'custom'
      ? `${dateRangeFrom||'…'} → ${dateRangeTo||'…'}`
      : ({today:"Aujourd'hui",yesterday:'Hier',week:'7 jours',month:'Ce mois'}[activeDateFilter]||activeDateFilter);
    chipsHTML.push(`<span class="chip chip-date">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      ${label}<button class="chip-remove" onclick="clearDateFilter()">✕</button></span>`);
  }
  if (searchQuery) {
    chipsHTML.push(`<span class="chip">"${esc(searchQuery)}"
      <button class="chip-remove" onclick="clearSearch()">✕</button></span>`);
  }

  chips.innerHTML = chipsHTML.join('');
  clearBtn.style.display = hasFilters ? '' : 'none';
}

function setFormatFilter(val) {
  activeFilter = val;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter===val));
  applyFilters();
}
function clearDateFilter() {
  activeDateFilter = 'all'; dateRangeFrom = ''; dateRangeTo = '';
  document.querySelectorAll('[data-date]').forEach(p => p.classList.toggle('active', p.dataset.date==='all'));
  document.getElementById('date-range-wrap').classList.remove('open');
  applyFilters();
}
function clearSearch() {
  searchQuery = '';
  document.getElementById('search-input').value = '';
  applyFilters();
}

// ═══════════════════════════════════════════
//  RENDER GRID (with date grouping)
// ═══════════════════════════════════════════
function showGrid(items) {
  const grid    = document.getElementById('library-grid');
  const isTrash = activeFilter === 'trash';
  grid.className = `library-grid${activeView === 'list' ? ' list-view' : ''}`;

  if (!items.length) {
    const emptyMsg = isTrash
      ? ['🗑️', 'Corbeille vide', 'Les carousels supprimés apparaîtront ici.']
      : (searchQuery || activeFilter !== 'all' || activeDateFilter !== 'all')
        ? ['◫', 'Aucun résultat', 'Essayez d\'autres filtres ou modifiez la période.']
        : ['◫', 'Aucun carousel généré', 'Créez votre premier carousel depuis l\'éditeur.'];
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">${emptyMsg[0]}</div>
        <h3>${emptyMsg[1]}</h3><p>${emptyMsg[2]}</p>
      </div>`;
    return;
  }

  // Group by date bucket when no specific date filter and sorting by date
  const showGroups = activeDateFilter === 'all' && !isTrash &&
                     (activeSort === 'date-desc' || activeSort === 'date-asc');

  if (showGroups) {
    // Build groups
    const groups = {};
    BUCKET_ORDER.forEach(k => { groups[k] = []; });
    items.forEach(item => { groups[getDateBucket(item.created_at)].push(item); });

    let cardIndex = 0;
    let html = '';
    BUCKET_ORDER.forEach(key => {
      const grpItems = groups[key];
      if (!grpItems.length) return;
      html += `<div class="group-header">
        <span class="group-label">${BUCKET_LABELS[key]}</span>
        <div class="group-line"></div>
        <span class="group-count">${grpItems.length}</span>
      </div>`;
      html += grpItems.map(item => buildCard(item, cardIndex++, false)).join('');
    });
    grid.innerHTML = html;
  } else {
    grid.innerHTML = items.map((item, i) => buildCard(item, i, isTrash)).join('');
  }
}

function buildCard(item, i, isTrash = false) {
  const thumbUrl = item.thumbnail ? `${item.thumbnail}?t=${Date.now()}` : null;
  const thumb = thumbUrl
    ? `<img src="${thumbUrl}" alt="${esc(item.display_name)}" loading="lazy">`
    : `<div class="card-thumb-placeholder">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span>PDF</span>
       </div>`;

  const badges = [
    item.slide_count ? `<span class="meta-badge badge-slides">${item.slide_count} slides</span>` : '',
    item.has_pdf     ? `<span class="meta-badge badge-pdf">PDF</span>` : '',
    item.has_png     ? `<span class="meta-badge badge-png">PNG</span>` : '',
  ].filter(Boolean).join('');

  const previewBtn = !isTrash && (item.has_png || item.has_pdf)
    ? `<button class="btn-preview-quick" onclick="event.stopPropagation();openLightbox('${esc(item.job_id)}','${esc(item.display_name)}',${item.slide_count},${item.has_pdf})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Aperçu
       </button>` : '';

  const trashBanner = isTrash
    ? `<div class="soft-delete-banner">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Corbeille
       </div>` : '';

  const actions = isTrash
    ? `<button class="btn-card restore" onclick="event.stopPropagation();restoreItem('${esc(item.job_id)}','${esc(item.display_name)}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
        Restaurer
       </button>
       <button class="btn-card danger" onclick="event.stopPropagation();confirmDelete('${esc(item.job_id)}','${esc(item.display_name)}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        Supprimer définitivement
       </button>`
    : `<button class="btn-card primary" onclick="openLightbox('${esc(item.job_id)}','${esc(item.display_name)}',${item.slide_count},${item.has_pdf})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Voir
       </button>
       <a class="btn-card" href="/api/library/${esc(item.job_id)}/download" onclick="event.stopPropagation()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        ZIP
       </a>
       <button class="btn-card danger" onclick="event.stopPropagation();softDelete('${esc(item.job_id)}','${esc(item.display_name)}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Sup.
       </button>`;

  const cardClass = `carousel-card${isTrash ? ' soft-deleted' : ''}`;
  const clickAction = isTrash ? '' : `onclick="openLightbox('${esc(item.job_id)}','${esc(item.display_name)}',${item.slide_count},${item.has_pdf})"`;

  return `
<div class="${cardClass}" style="animation-delay:${i*0.04}s" ${clickAction}>
  <div class="card-thumb" style="position:relative">
    ${thumb}
    ${trashBanner}
    <div class="card-thumb-overlay">${previewBtn}</div>
    ${item.slide_count > 1 && !isTrash ? `<div class="slide-count-badge">${item.slide_count} slides</div>` : ''}
  </div>
  <div class="card-body">
    <div class="card-name-row">
      <span class="card-name" title="${esc(item.display_name)}">${esc(item.display_name)}</span>
      ${!isTrash ? `
      <input class="card-name-input" value="${esc(item.display_name)}" data-job="${esc(item.job_id)}"
             onkeydown="handleRenameKey(event, this)" onblur="cancelRename(this)">
      <button class="btn-rename-icon" title="Renommer" onclick="event.stopPropagation();startRename(this.parentElement)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>` : ''}
    </div>
    <div class="card-meta">
      ${badges}
      <span class="card-date" title="${esc(item.created_at)}">${formatRelative(item.created_at)}</span>
    </div>
    <span class="card-size">${formatSize(item.size_bytes)}</span>
    <div class="card-actions" onclick="event.stopPropagation()">
      ${actions}
    </div>
  </div>
</div>`;
}

// ═══════════════════════════════════════════
//  VIEW TOGGLE
// ═══════════════════════════════════════════
function setView(mode) {
  activeView = mode;
  document.getElementById('view-grid').classList.toggle('active', mode === 'grid');
  document.getElementById('view-list').classList.toggle('active', mode === 'list');
  showGrid(filtered);
}

// ═══════════════════════════════════════════
//  RENAME (inline)
// ═══════════════════════════════════════════
function startRename(nameRow) {
  const nameEl  = nameRow.querySelector('.card-name');
  const inputEl = nameRow.querySelector('.card-name-input');
  nameEl.style.display  = 'none';
  inputEl.style.display = 'block';
  inputEl.focus();
  inputEl.select();
}

function cancelRename(inputEl) {
  const nameEl  = inputEl.previousElementSibling;
  inputEl.style.display = 'none';
  nameEl.style.display  = '';
}

function handleRenameKey(e, inputEl) {
  if (e.key === 'Escape') { cancelRename(inputEl); return; }
  if (e.key !== 'Enter')  return;
  e.preventDefault();
  const jobId   = inputEl.dataset.job;
  const newName = inputEl.value.trim();
  if (!newName) { cancelRename(inputEl); return; }
  doRename(jobId, newName, inputEl);
}

async function doRename(jobId, newName, inputEl) {
  try {
    const res  = await fetch(`/api/library/${encodeURIComponent(jobId)}/rename`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: newName}),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur');
    toast('Renommé avec succès', 'success');
    loadLibrary();
  } catch(e) {
    toast(e.message, 'error');
    if (inputEl) cancelRename(inputEl);
  }
}

// ═══════════════════════════════════════════
//  SOFT DELETE (frontend only — localStorage)
// ═══════════════════════════════════════════
function softDelete(jobId, name) {
  trashSet.add(jobId);
  saveTrash(trashSet);
  updateTrashBadge();
  applyFilters();

  // Undo toast with 5s countdown bar
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className = 'toast undo';
  el.style.position = 'relative';
  el.style.overflow  = 'hidden';
  el.innerHTML = `
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
    <span style="flex:1">"${esc(name)}" déplacé en corbeille</span>
    <button class="btn-undo" onclick="undoSoftDelete('${esc(jobId)}', this.closest('.toast'))">↩ Annuler</button>
    <div class="undo-bar" style="animation-duration:5s"></div>`;
  wrap.appendChild(el);

  const timer = setTimeout(() => el.remove(), 5000);
  el.dataset.timer = timer;
}

function undoSoftDelete(jobId, toastEl) {
  clearTimeout(Number(toastEl.dataset.timer));
  toastEl.remove();
  trashSet.delete(jobId);
  saveTrash(trashSet);
  updateTrashBadge();
  applyFilters();
}

function restoreItem(jobId, name) {
  trashSet.delete(jobId);
  saveTrash(trashSet);
  updateTrashBadge();
  applyFilters();
  toast(`"${name}" restauré`, 'success');
}

// ═══════════════════════════════════════════
//  HARD DELETE (suppression disque)
// ═══════════════════════════════════════════
function confirmDelete(jobId, name) {
  document.getElementById('confirm-msg').textContent =
    `"${name}" sera supprimé définitivement du serveur (dossier + tous les fichiers). Cette action est irréversible.`;
  document.getElementById('confirm-ok').onclick = () => doDelete(jobId);
  document.getElementById('confirm-modal').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('open');
}

async function doDelete(jobId) {
  closeConfirm();
  closeLightbox();
  try {
    const res = await fetch(`/api/library/${encodeURIComponent(jobId)}`, {method: 'DELETE'});
    if (!res.ok) throw new Error('Erreur de suppression');
    trashSet.delete(jobId);
    saveTrash(trashSet);
    updateTrashBadge();
    toast('Carousel supprimé définitivement', 'success');
    loadLibrary();
  } catch(e) {
    toast(e.message, 'error');
  }
}

// ═══════════════════════════════════════════
//  LIGHTBOX
// ═══════════════════════════════════════════
function openLightbox(jobId, name, slideCount, hasPdf) {
  lbJob    = jobId;
  lbSlides = Array.from({length: slideCount}, (_, i) => i);
  lbIndex  = 0;

  document.getElementById('lb-title').textContent = name;
  document.getElementById('lb-btn-dl').href = `/api/library/${encodeURIComponent(jobId)}/download`;
  document.getElementById('lb-btn-del').onclick = () => confirmDelete(jobId, name);
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Show / hide PDF download button
  const pdfBtn = document.getElementById('lb-btn-pdf');
  if (hasPdf) {
    pdfBtn.href = `/api/library/${encodeURIComponent(jobId)}/pdf`;
    pdfBtn.style.display = '';
  } else {
    pdfBtn.style.display = 'none';
  }

  if (slideCount > 0) {
    // PNG slides: normal image viewer — s'assurer que pdf-mode est désactivé
    document.getElementById('lightbox').classList.remove('pdf-mode');
    renderLbSlide(0);
  } else if (hasPdf) {
    // PDF-only carousel: render inline with iframe
    renderLbPdf(jobId);
  } else {
    // No content at all (shouldn't happen)
    document.getElementById('lb-img-wrap').innerHTML = `
      <div class="lightbox-pdf-msg">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>Aucun fichier disponible</p>
      </div>`;
    document.getElementById('lb-dots').innerHTML = '';
    document.getElementById('lb-counter').textContent = '—';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
  }
}

function renderLbPdf(jobId) {
  const pdfUrl = `/api/library/${encodeURIComponent(jobId)}/pdf`;
  const wrap   = document.getElementById('lb-img-wrap');

  // Activer le mode plein écran PDF
  document.getElementById('lightbox').classList.add('pdf-mode');

  wrap.innerHTML = `
    <div class="lightbox-pdf-viewer">
      <iframe
        class="lightbox-pdf-iframe"
        src="${pdfUrl}#toolbar=1&navpanes=1&scrollbar=1&view=FitH&zoom=page-fit"
        title="Aperçu PDF"
        allow="fullscreen"
      ></iframe>
    </div>`;

  document.getElementById('lb-dots').innerHTML      = '';
  document.getElementById('lb-counter').textContent = 'PDF';
  document.getElementById('btn-prev').disabled      = true;
  document.getElementById('btn-next').disabled      = true;
}

function renderLbSlide(index) {
  lbIndex = index;
  const total = lbSlides.length;
  const img   = document.getElementById('lb-img');

  document.getElementById('lb-img-wrap').innerHTML =
    `<img class="lightbox-img" id="lb-img" src="/api/library/${encodeURIComponent(lbJob)}/slide/${index}?t=${Date.now()}" alt="Slide ${index+1}">`;

  document.getElementById('lb-counter').textContent = `${index + 1} / ${total}`;
  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === total - 1;

  // Dots
  const dots = document.getElementById('lb-dots');
  dots.innerHTML = lbSlides.map((_, i) =>
    `<div class="lb-dot${i === index ? ' active' : ''}" onclick="renderLbSlide(${i})"></div>`
  ).join('');
}

function lbNav(dir) {
  const next = lbIndex + dir;
  if (next < 0 || next >= lbSlides.length) return;
  renderLbSlide(next);
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open', 'pdf-mode');
  document.body.style.overflow = '';
  lbJob = null; lbSlides = []; lbIndex = 0;
}

// Clic hors image pour fermer
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

// ── Swipe tactile (mobile) ──
(function() {
  let touchStartX = 0;
  let touchStartY = 0;
  const lb = document.getElementById('lightbox');
  lb.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive: true});
  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      lbNav(dx < 0 ? 1 : -1);
    }
  }, {passive: true});
})();

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function formatSize(bytes) {
  if (!bytes) return '0 B';
  if (bytes < 1024)       return bytes + ' B';
  if (bytes < 1048576)    return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function formatDate(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('fr-FR', {day:'2-digit',month:'short',year:'numeric'});
  } catch { return iso; }
}

function formatTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
  } catch { return ''; }
}

function formatRelative(iso) {
  if (!iso) return '—';
  try {
    const now  = new Date();
    const d    = new Date(iso);
    const diffS = Math.floor((now - d) / 1000);
    if (diffS < 60)   return 'À l\'instant';
    if (diffS < 3600) return `Il y a ${Math.floor(diffS/60)} min`;
    if (diffS < 86400) return `Il y a ${Math.floor(diffS/3600)} h`;
    if (diffS < 172800) return `Hier ${formatTime(iso)}`;
    return `${formatDate(iso)} · ${formatTime(iso)}`;
  } catch { return iso; }
}

function formatDateShort(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    const diffS = Math.floor((new Date() - d) / 1000);
    if (diffS < 3600)  return `${Math.floor(diffS/60)} min`;
    if (diffS < 86400) return `${Math.floor(diffS/3600)} h`;
    return d.toLocaleDateString('fr-FR', {day:'2-digit',month:'short'});
  } catch { return iso; }
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, type='success') {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = (type === 'success'
    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
  ) + msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
